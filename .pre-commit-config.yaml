repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^frontend/tsconfig.*\.json$
      - id: detect-private-key

  - repo: local
    hooks:
      - id: backend-check
        name: backend check (ruff + ty)
        entry: task dev:backend:check
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: frontend-check
        name: frontend check (tsc + biome)
        entry: task dev:frontend:check
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json)$
        exclude: ^frontend/node_modules/
        pass_filenames: false
