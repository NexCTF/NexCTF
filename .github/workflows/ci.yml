name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-check:
    name: Ruff + ty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install Task
        run: curl -sSfL https://taskfile.dev/install.sh | sudo sh -s -- -b /usr/local/bin
      - run: uv sync --frozen
        working-directory: backend
      - run: task dev:backend:check

  backend-test:
    name: pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: nexctf
          POSTGRES_PASSWORD: nexctf
          POSTGRES_DB: nexctf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexctf"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      cache:
        image: valkey/valkey:9.1-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      s3:
        image: ghcr.io/coollabsio/maxio:0.4.2
        env:
          MAXIO_ACCESS_KEY: admin
          MAXIO_SECRET_KEY: admin
          MAXIO_DEFAULT_BUCKETS: nexctf
        ports:
          - 9000:9000
    env:
      NEXCTF_TEST_MODE: "1"
      POSTGRES_SERVER: localhost
      POSTGRES_USER: nexctf
      POSTGRES_PASSWORD: nexctf
      POSTGRES_DB: nexctf
      REDIS_HOST: localhost
      S3_HOST: localhost
      S3_PORT: "9000"
      S3_BUCKET: nexctf
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: admin
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv sync --frozen
      - run: uv run pytest -n auto

  frontend-check:
    name: TypeScript + Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install Task
        run: curl -sSfL https://taskfile.dev/install.sh | sudo sh -s -- -b /usr/local/bin
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: task dev:frontend:check
