name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-check:
    name: Ruff + ty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
      - name: Install Task
        run: curl -sSfL https://taskfile.dev/install.sh | sudo sh -s -- -b /usr/local/bin
      - run: uv sync --frozen
        working-directory: backend
      - run: task dev:backend:check

  backend-test:
    name: pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgres:18.4-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_USER: nexctf
          POSTGRES_PASSWORD: nexctf
          POSTGRES_DB: nexctf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexctf"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      cache:
        image: valkey/valkey:9.1-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      s3:
        image: ghcr.io/coollabsio/maxio:0.4.2@sha256:2e7fc2a32d66fb31c44ce366e8a289218d3c38fcbe25bd6fa575b4df7c0e0272
        env:
          MAXIO_ACCESS_KEY: admin
          MAXIO_SECRET_KEY: admin
          MAXIO_DEFAULT_BUCKETS: nexctf
        ports:
          - 9000:9000
    env:
      NEXCTF_TEST_MODE: "1"
      POSTGRES_SERVER: localhost
      POSTGRES_USER: nexctf
      POSTGRES_PASSWORD: nexctf
      POSTGRES_DB: nexctf
      REDIS_HOST: localhost
      S3_HOST: localhost
      S3_PORT: "9000"
      S3_BUCKET: nexctf
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: admin
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
      - run: uv sync --frozen
      - run: uv run pytest -n auto

  frontend-check:
    name: TypeScript + Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install Task
        run: curl -sSfL https://taskfile.dev/install.sh | sudo sh -s -- -b /usr/local/bin
      - run: bun install --frozen-lockfile
        working-directory: frontend
      - run: task dev:frontend:check
