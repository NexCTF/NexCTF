repos:
  - repo: local
    hooks:
      - id: backend-check
        name: backend check (ruff + ty)
        entry: task dev:backend:check
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: frontend-check
        name: frontend check (tsc + biome)
        entry: task dev:frontend:check
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json)$
        exclude: ^frontend/node_modules/
        pass_filenames: false
